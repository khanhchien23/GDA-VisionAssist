# GDA-VisionAssist - Application Configuration
# Cấu hình ứng dụng chính

# Webcam settings
webcam:
  width: 640
  height: 480
  fps: 10
  device_id: 0

# UI settings
ui:
  status_bar_height: 100
  progress_bar_height: 10
  mask_alpha: 0.3
  window_title: "GDA - Fixed Tensor Size"

# Inference settings
inference:
  queue_maxsize: 1
  voice_timeout: 4.0
  max_recording_time: 5.0
  min_audio_bytes: 500

# Voice settings
voice:
  enable_stt: true
  enable_tts: true
  tts_voice: "vi-VN-HoaiMyNeural"
  stt_language: "vi-VN"
  fallback_language: "en-US"

# Debug
debug: false

# Memory management
frame_cleanup_interval: 30
